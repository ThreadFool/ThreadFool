name: Keep Alive

on:
  schedule:
    - cron: '0 15 3 * *'  

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update keepalive file
        run: |
          date > .keepalive
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .keepalive
          git commit -m "keepalive"
          git push
